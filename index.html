<html lang="en">
  <head>

    <!-- Primary SEO Meta Tags -->
    <title>Sky High Holidays | Best Travel Agency in Pune, India | Luxury Tour Packages</title>
    <meta name="description" content="Sky High Holidays - Your premium travel partner in Pune, India. Book the best international and domestic tour packages, luxury honeymoon trips, Bali tours, Dubai packages, and customized holiday itineraries." />

    <meta name="author" content="Sky High Holidays" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://skyhighholidays.vercel.app/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://skyhighholidays.vercel.app/" />
    <meta property="og:title" content="Sky High Holidays | Best Travel Agency in Pune, India" />
    <meta property="og:description" content="Book the best international and domestic tour packages with Sky High Holidays. Luxury honeymoon packages, Bali tours, Dubai packages, and custom itineraries from India." />
    <meta property="og:site_name" content="Sky High Holidays" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sky High Holidays | Best Travel Agency in Pune, India" />
    <meta name="twitter:description" content="Book the best international and domestic tour packages with Sky High Holidays. Luxury honeymoon packages, Bali tours, Dubai packages from India." />

    <!-- Geo Tags -->
    <meta name="geo.region" content="IN-MH" />
    <meta name="geo.placename" content="Pune" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- JSON-LD Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TravelAgency",
      "name": "Sky High Holidays",
      "alternateName": ["SkyHigh Holidays", "Sky High Travels", "Sky High Tour Packages"],
      "url": "https://skyhighholidays.vercel.app",
      "description": "Sky High Holidays is a premium travel agency in Pune, India offering international and domestic tour packages, luxury honeymoon trips, Bali tours, Dubai packages, and customized holiday itineraries.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Pune",
        "addressRegion": "Maharashtra",
        "addressCountry": "IN"
      },
      "areaServed": ["Pune", "Mumbai", "Delhi", "Bangalore", "Hyderabad", "India"],
      "knowsAbout": ["International Tour Packages", "Domestic Tour Packages", "Luxury Travel", "Honeymoon Packages", "Bali Tours", "Dubai Tours", "Thailand Tours", "Maldives Honeymoon", "Europe Tours"],
      "priceRange": "$$"
    }
    </script>

    <!-- JSON-LD Structured Data: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "https://skyhighholidays.vercel.app",
      "name": "Sky High Holidays",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://skyhighholidays.vercel.app/destinations/{search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD Structured Data: SiteNavigationElement for Google Sitelinks -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "itemListElement": [
        {
          "@type": "SiteNavigationElement",
          "position": 1,
          "name": "Home",
          "url": "https://skyhighholidays.vercel.app/"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 2,
          "name": "International Tour Packages",
          "url": "https://skyhighholidays.vercel.app/#international-packages"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 3,
          "name": "Domestic Tour Packages",
          "url": "https://skyhighholidays.vercel.app/#domestic-packages"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 4,
          "name": "Custom Tour Packages",
          "url": "https://skyhighholidays.vercel.app/contact"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 5,
          "name": "Contact Us",
          "url": "https://skyhighholidays.vercel.app/contact"
        },
        {
          "@type": "SiteNavigationElement",
          "position": 6,
          "name": "Reviews",
          "url": "https://skyhighholidays.vercel.app/reviews"
        }
      ]
    }
    </script>

    <!-- JSON-LD Structured Data: BreadcrumbList -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://skyhighholidays.vercel.app/" },
        { "@type": "ListItem", "position": 2, "name": "International Packages", "item": "https://skyhighholidays.vercel.app/#international-packages" },
        { "@type": "ListItem", "position": 3, "name": "Domestic Packages", "item": "https://skyhighholidays.vercel.app/#domestic-packages" },
        { "@type": "ListItem", "position": 4, "name": "Contact Us", "item": "https://skyhighholidays.vercel.app/contact" },
        { "@type": "ListItem", "position": 5, "name": "About Us", "item": "https://skyhighholidays.vercel.app/about" }
      ]
    }
